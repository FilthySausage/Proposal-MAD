<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 250 210" width="250" height="210" role="img" aria-label="X-FatHub Lockup Dark">
  <title>X-FatHub Stacked Lockup - Dark</title>
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Container -->
  <rect width="220" height="180" rx="30" fill="transparent"/>

  <!-- Icon Mark Central -->
  <g transform="translate(68, 16)">
    <!-- Soft shadow -->
    <rect x="-1" y="-1" width="86" height="86" rx="26" fill="none" stroke="#ffa500" stroke-width="8" opacity="0.18"/>
    <!-- Shell -->
    <rect x="2" y="2" width="80" height="80" rx="24" fill="url(#bg-dark)"/>
    <rect x="2" y="2" width="80" height="80" rx="24" fill="none" stroke="#ffa500" stroke-width="1.5"/>
    
    <!-- Core SVG -->
    <g transform="translate(15, 15) scale(0.72)">
      <line x1="18" y1="18" x2="54" y2="54" stroke="#ffa500" stroke-width="7" stroke-linecap="round"/>
      <line x1="54" y1="18" x2="18" y2="54" stroke="#ffa500" stroke-width="7" stroke-linecap="round"/>
      <polyline points="10,36 20,36 26,22 32,50 38,28 44,42 50,36 62,36"
        stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="36" cy="36" r="4.5" fill="#ffa500"/>
    </g>
  </g>

  <!-- Text -->
  <g transform="translate(110, 138)" text-anchor="middle">
    <!-- App Name -->
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="32" letter-spacing="-1">
      <tspan fill="#ffa500">X</tspan><tspan fill="#ffffff">-FatHub</tspan>
    </text>
    <!-- Tagline -->
    <text y="22" font-family="'Inter', sans-serif" font-weight="600" font-size="11" fill="#666666" letter-spacing="2.5" text-transform="uppercase">TRACK · BURN · THRIVE</text>
  </g>
</svg>
