<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -15 330 118" width="330" height="118" role="img" aria-label="X-FatHub Wordmark Dark">
  <title>X-FatHub Wordmark - Dark</title>
  <defs>
    <linearGradient id="bg-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1000"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
  </defs>

  <!-- Container -->
  <rect width="300" height="88" rx="24" fill="transparent"/>

  <!-- Icon Mark (Splash Design) -->
  <g transform="translate(10, 10)">
    <!-- Outer soft shadow -->
    <rect x="-1" y="-1" width="70" height="70" rx="20" fill="none" stroke="#ffa500" stroke-width="6" opacity="0.18"/>
    <!-- Shell -->
    <rect x="2" y="2" width="64" height="64" rx="18" fill="url(#bg-dark)"/>
    <rect x="2" y="2" width="64" height="64" rx="18" fill="none" stroke="#ffa500" stroke-width="1.5"/>
    
    <!-- Core SVG -->
    <g transform="translate(10, 10) scale(0.666)">
      <line x1="18" y1="18" x2="54" y2="54" stroke="#ffa500" stroke-width="7" stroke-linecap="round"/>
      <line x1="54" y1="18" x2="18" y2="54" stroke="#ffa500" stroke-width="7" stroke-linecap="round"/>
      <polyline points="10,36 20,36 26,22 32,50 38,28 44,42 50,36 62,36"
        stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="36" cy="36" r="4.5" fill="#ffa500"/>
    </g>
  </g>

  <!-- Wordmark Text -->
  <g transform="translate(94, 46)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="34" letter-spacing="-1">
      <tspan fill="#ffa500">X</tspan><tspan fill="#ffffff">-FatHub</tspan>
    </text>
  </g>

  <!-- Tagline Text -->
  <g transform="translate(96, 68)">
    <text font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#666666" letter-spacing="2.5" text-transform="uppercase">TRACK · BURN · THRIVE</text>
  </g>
</svg>
