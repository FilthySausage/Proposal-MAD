<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180" width="220" height="180" role="img" aria-label="X-FatHub Stacked Lockup — On Orange">
  <title>X-FatHub On Orange</title>
  <defs>
    <style>
      .lk-name { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; font-size: 34px; letter-spacing: -1px; }
      .lk-tag  { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 600; font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; }
    </style>
    <linearGradient id="bg-oo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa500"/>
      <stop offset="100%" stop-color="#ff6b00"/>
    </linearGradient>
  </defs>

  <!-- Orange card -->
  <rect x="0" y="0" width="220" height="180" rx="24" ry="24" fill="url(#bg-oo)"/>

  <!-- Icon centred: 72×72 at x=74, y=18 -->
  <g transform="translate(74,18)">
    <line x1="14" y1="14" x2="58" y2="58" stroke="#000000" stroke-width="7" stroke-linecap="round"/>
    <line x1="58" y1="14" x2="14" y2="58" stroke="#000000" stroke-width="7" stroke-linecap="round"/>
    <polyline points="4,36 16,36 22,20 30,52 37,24 44,44 51,36 68,36"
      stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <circle cx="36" cy="36" r="5" fill="#000000"/>
  </g>

  <!-- App name centred — all black -->
  <text x="110" y="120" text-anchor="middle" class="lk-name" fill="#000000">X-FatHub</text>
  <!-- Tagline -->
  <text x="110" y="138" text-anchor="middle" class="lk-tag" fill="rgba(0,0,0,0.45)">Track · Burn · Thrive</text>
</svg>
