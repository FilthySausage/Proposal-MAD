<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="X-FatHub Icon Mark — Dark">
  <title>X-FatHub Icon Mark</title>
  <!-- Card background -->
  <rect x="0" y="0" width="120" height="120" rx="28" ry="28" fill="#111111"/>
  <!-- Radial glow -->
  <radialGradient id="glow" cx="50%" cy="0%" r="80%">
    <stop offset="0%" stop-color="#ffa500" stop-opacity="0.16"/>
    <stop offset="100%" stop-color="#ffa500" stop-opacity="0"/>
  </radialGradient>
  <rect x="0" y="0" width="120" height="120" rx="28" ry="28" fill="url(#glow)"/>
  <!-- X strokes — orange, centred in 120×120, icon core 72×72 offset by 24 -->
  <g transform="translate(24,24)">
    <line x1="14" y1="14" x2="58" y2="58" stroke="#ffa500" stroke-width="7" stroke-linecap="round"/>
    <line x1="58" y1="14" x2="14" y2="58" stroke="#ffa500" stroke-width="7" stroke-linecap="round"/>
    <!-- ECG pulse — white -->
    <polyline points="4,36 16,36 22,20 30,52 37,24 44,44 51,36 68,36"
      stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Centre dot — orange -->
    <circle cx="36" cy="36" r="5" fill="#ffa500"/>
  </g>
</svg>
